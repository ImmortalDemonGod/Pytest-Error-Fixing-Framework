[pytest]
pythonpath = src
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: mark test as async/await test function
    integration: end-to-end tests requiring external tools (hypothesis CLI, etc.)
addopts = -ra -q --ignore=tests/temp_failing_test.py --ignore=tests/test_math_operations.py -m "not integration"
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
asyncio_default_fixture_loop_scope = function